services:
    app:
        image: ${DOCKERHUB_USERNAME}/cicd-laravel:${IMAGE_TAG:-latest}
        container_name: laravel_app
        restart: unless-stopped
        volumes:
            # Mount file .env dari server (tidak ikut ke dalam image)
            - ./.env:/var/www/html/.env:ro
            # Storage persisten (upload file, log, dll)
            - laravel_storage:/var/www/html/storage
        environment:
            - APP_ENV=production
        networks:
            - laravel_network
        depends_on:
            db:
                condition: service_healthy

    nginx:
        image: nginx:1.25-alpine
        container_name: laravel_nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
            # Nginx hanya perlu config file — akses ke public/ ditangani lewat
            # FastCGI ke container app, bukan lewat filesystem langsung
        networks:
            - laravel_network
        depends_on:
            - app

    db:
        image: mysql:8.0
        container_name: laravel_db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - laravel_network
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "-p${DB_ROOT_PASSWORD}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    laravel_network:
        driver: bridge

volumes:
    db_data:
    laravel_storage: